<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us | GreenTech Solutions</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <button id="topBtn" title="Go to top">↑</button>
    <header>
        <nav>
            <ul>
                <li><a href="index.html">Home</a></li>
                <li><a href="about.html">About Us</a></li>
                <li><a href="products.html">Products</a></li>
                <li><a href="resources.html">Resources</a></li>
                <li><a href="contact.html">Contact</a></li>
            </ul>
        </nav>
    </header>

    <main class="content-wrapper">
        <div class="banner-container">
            <h1>Contact Us</h1>
            <p class="tagline">Sign up for our newsletter to start your sustainable journey today.</p>
        </div>

        <section class="form-container">
            <!-- Requirement: HTML Form (Element Type #5) -->
            <form id="contact-form">
                <div class="input-group">
                    <label for="name">Name:</label>
                    <input type="text" id="name" name="name" required placeholder="Your Name">
                </div>

                <div class="input-group">
                    <label for="email">Email:</label>
                    <input type="email" id="email" name="email" required placeholder="Business Email">
                </div>

                <div class="input-group">
                    <label for="message">Message:</label>
                    <textarea id="message" name="message" rows="5" placeholder="How can we help you?"></textarea>
                </div>

                <button type="submit" class="cta-button">Send Message</button>
            </form>
        </section>

        <!-- Requirement: Address/Contact Info -->
        <section class="contact-info">
            <p><strong>Email:</strong> greentech@greentech.com</p>
            <p><strong>Phone:</strong> (505) 123-4567</p>
            <p><strong>Address:</strong> 777 Welovetechnology Ln, Las Cruces, NM 88011</p>
        </section>
    </main>

    <footer>
        <p>&copy; 2024 GreenTech Solutions</p>
    </footer>

    <script src="script.js"></script>
</body>
</html>
